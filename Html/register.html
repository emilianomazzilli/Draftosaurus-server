<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Registrarse - Draftosaurus</title>
  <link rel="stylesheet" href="../Css/styles.css">
  <link rel="stylesheet" href="../Css/form.css">
</head>

<body>
  <div class="container">
    <h1 class="titulo">Registrarse</h1>
    <form class="formulario" action="../Php/agregar.php" method="post">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required autocomplete="name">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" required autocomplete="username">
      <label for="contrasena">Contraseña</label>
      <div class="password-wrapper">
        <input type="password" id="contrasena" name="contrasena" required autocomplete="new-password">
        <button type="button" class="ojo" onclick="togglePassword('contrasena', this)">👁️</button>
      </div>
      <button type="submit" class="btn aceptar">Aceptar</button>
    </form>
  </div>
  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈";
      } else {
        input.type = "password";
        btn.textContent = "👁️";
      }
    }
  </script>
</body>

</html>
