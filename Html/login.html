<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión - Draftosaurus</title>
  <link rel="stylesheet" href="../Css/styles.css">
  <link rel="stylesheet" href="../Css/form.css">
</head>

<body>
  <div class="container">
    <h1 class="titulo">Iniciar sesión</h1>

    <!-- el form ahora apunta al procesador -->
    <form class="formulario" action="../Php/process_login.php" method="post">
      <label for="usuario">Usuario o Email</label>
      <input type="text" id="usuario" name="usuario" required autocomplete="username">
      <label for="contrasena">Contraseña</label>
      <div class="password">
        <input type="password" id="password" name="contrasena" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn aceptar">Aceptar</button>
    </form>
  </div>

  <script src="../js/script.js"></script>
</body>

</html>
